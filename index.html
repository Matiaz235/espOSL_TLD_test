<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dioda kontrolna luminescencji</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #connBtn { background: #007AFF; color: white; }
        #connBtn.connected { background: #2c2c2e; color: #34C759; border: 1px solid #34C759; }
        
        #actionBtn { background: #34C759; color: white; display: none; font-size: 18px; }
        #actionBtn.running { background: #FF3B30; }

        .btn-mode { background: #3a3a3c; color: #bbb; width: 48%; display: inline-block; }
        .active-mode { background: #FF9500; color: white; }
        
        input[type=range] { width: 100%; margin: 15px 0; accent-color: #FF9500; }
        .label { display: flex; justify-content: space-between; font-size: 13px; color: #8e8e93; margin-top: 15px; }
        .val { color: #FF9500; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Dioda kontrolna</h2>
        <button id="connBtn" onclick="connectBT()">POŁĄCZ Z URZĄDZENIEM</button>
        
        <div id="controls" style="display:none;">
            <hr>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-mode active-mode" id="btnTLD" onclick="setMode(0)">Tryb TLD</button>
                <button class="btn-mode" id="btnOSL" onclick="setMode(1)">Tryb OSL</button>
            </div>

            <div class="label"><span>Jasność (I0):</span> <span class="val" id="iShow">1023</span></div>
            <input type="range" min="0" max="1023" value="1023" oninput="updateParam('I', this.value, 'iShow', '')">

            <div class="label"><span>Czas impulsu (TLD):</span> <span class="val" id="dShow">500 ms</span></div>
            <input type="range" min="10" max="2000" step="10" value="500" oninput="updateParam('D', this.value, 'dShow', ' ms')">

            <div class="label"><span>Stała zaniku (OSL):</span> <span class="val" id="tShow">1.0 s</span></div>
            <input type="range" min="0.1" max="10.0" step="0.1" value="1.0" oninput="updateParam('T', this.value, 'tShow', ' s')">

            <div class="label"><span>Przerwa (Interwał):</span> <span class="val" id="gShow">1000 ms</span></div>
            <input type="range" min="0" max="5000" step="50" value="1000" oninput="updateParam('G', this.value, 'gShow', ' ms')">

            <button id="actionBtn" onclick="toggleAction()">START</button>
        </div>
    </div>

    <script>
        let charac;
        let device;
        let isRunning = false;
        const SERVICE_UUID = "0000180c-0000-1000-8000-00805f9b34fb";
        const CHAR_UUID = "00002a56-0000-1000-8000-00805f9b34fb";

        async function connectBT() {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                device.addEventListener('gattserverdisconnected', onDisconnected);
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                charac = await service.getCharacteristic(CHAR_UUID);
                
                // Aktualizacja UI po połączeniu
                document.getElementById('connBtn').innerText = "✓ POŁĄCZONO";
                document.getElementById('connBtn').classList.add('connected');
                document.getElementById('controls').style.display = 'block';
                document.getElementById('actionBtn').style.display = 'block';
            } catch (e) { console.log(e); }
        }

        function onDisconnected() {
            // Reset interfejsu po utracie połączenia
            isRunning = false;
            document.getElementById('connBtn').innerText = "POŁĄCZ Z URZĄDZENIEM";
            document.getElementById('connBtn').classList.remove('connected');
            document.getElementById('controls').style.display = 'none';
            document.getElementById('actionBtn').classList.remove('running');
            document.getElementById('actionBtn').innerText = "START";
        }

        function toggleAction() {
            isRunning = !isRunning;
            const btn = document.getElementById('actionBtn');
            
            if (isRunning) {
                btn.innerText = "STOP";
                btn.classList.add('running');
                send("START");
            } else {
                btn.innerText = "START";
                btn.classList.remove('running');
                send("STOP");
            }
        }

        function setMode(m) {
            document.getElementById('btnTLD').classList.toggle('active-mode', m===0);
            document.getElementById('btnOSL').classList.toggle('active-mode', m===1);
            send(m === 0 ? 'MOD0' : 'MOD1');
        }

        function updateParam(prefix, val, spanId, unit) {
            document.getElementById(spanId).innerText = val + unit;
            send(prefix + val);
        }

        async function send(msg) {
            if (!charac) return;
            try {
                await charac.writeValue(new TextEncoder().encode(msg));
            } catch (e) { console.log("Błąd wysyłania: " + e); }
        }
    </script>
</body>
</html>
